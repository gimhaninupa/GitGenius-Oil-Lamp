<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Oil Lamp Ceremony</title>
    <meta name="description" content="An interactive, premium virtual oil lamp lighting ceremony for events, supporting dual-screen tablet controls.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper display-wrapper">
        <div class="ritual-container" id="ritualContainer">
            <!-- Ambient Background overlay -->
            <div class="ambient-vignette"></div>

            <!-- Full Screen Lit Overlay for Finale Activation -->
            <div class="lit-overlay" id="litOverlay"></div>



            <!-- Altar System -->
            <div class="altar-system">
                <!-- Central Altar Disk with Exact Art -->
                <div class="central-disk" id="altarDisk"></div>

                <!-- The Oil Lamps container (Wicks will be injected here dynamically) -->
                <div class="lamps-container" id="lampsContainer">
                    <!-- Loaded dynamically via script.js -->
                </div>
            </div>

            <!-- Guest Lighting Banner Overlay -->
            <div class="guest-banner" id="guestBanner">
                <div class="banner-border-line top"></div>
                <div class="banner-content">
                    <span class="banner-subtitle" id="bannerGuestTitle">CHIEF GUEST</span>
                    <h2 class="banner-title-name" id="bannerGuestName">Hon. Chief Guest</h2>
                    <span class="banner-badge">LIT THE OIL LAMP</span>
                </div>
                <div class="banner-border-line bottom"></div>
            </div>

            <!-- Floating Names Container (text floats up from wicks) -->
            <div class="floating-names-container" id="floatingNamesContainer"></div>

            <!-- Destruction/Celebration overlays -->
            <div class="destruction-overlay" id="destructionOverlay"></div>
            <div class="dust-container" id="dustContainer"></div>
        </div>

        <!-- The Reveal Container (Outside the ritual container to avoid filters) -->
        <div class="reveal-container" id="revealContainer">
            <div class="light-burst"></div>
            <img src="logo.png" alt="Genius Logo" class="reveal-logo">
        </div>

        <!-- Hidden Settings Control Panel (Toggled via 'C' key or gear icon) -->
        <div class="settings-drawer" id="settingsDrawer">
            <div class="drawer-header">
                <h3>Ceremony Settings</h3>
                <button class="drawer-close" id="closeDrawerBtn">✕</button>
            </div>
            <div class="drawer-body">
                <div class="settings-group">
                    <label>Sync Mode</label>
                    <div class="sync-status-display">
                        <span class="status-dot offline" id="displayConnDot"></span>
                        <span id="displayConnText">Offline Sync (LocalStorage)</span>
                    </div>
                </div>

                <div class="settings-group">
                    <label for="wicksCountInput">Total Wicks</label>
                    <input type="number" id="wicksCountInput" min="1" max="16" value="10">
                </div>

                <div class="settings-group checkbox">
                    <input type="checkbox" id="soundToggle" checked>
                    <label for="soundToggle">Enable Procedural Sound</label>
                </div>

                <div class="settings-group checkbox">
                    <input type="checkbox" id="singleScreenToggle">
                    <label for="singleScreenToggle">Single-Screen Mode (Touch to Light)</label>
                </div>

                <hr class="drawer-divider">

                <div class="settings-actions">
                    <button class="btn btn-secondary btn-full" id="settingsResetBtn">Reset Altar Ceremony</button>
                    <button class="btn btn-danger btn-full" id="settingsForceFinaleBtn">Force Reveal Finale</button>
                </div>
            </div>
        </div>

        <!-- Interactive Single-Screen Overlay (Only visible when Single-Screen is enabled) -->
        <div class="single-screen-trigger" id="singleScreenTriggerBtn">
            <div class="trigger-label">TAP TO LIGHT NEXT WICK</div>
        </div>

        <!-- Subtle Settings Toggle Icon (in the corner, fades out after mouse idle) -->
        <button class="settings-toggle-btn" id="openDrawerBtn" title="Open Settings (Press 'C')">⚙</button>
    </div>

    <!-- Configuration Script -->
    <script src="config.js?v=10"></script>
    <!-- Display Logic -->
    <script src="script.js?v=10"></script>
</body>
</html>
