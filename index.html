<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Oil Lamp Ceremony</title>
    <meta name="description" content="An interactive, premium virtual oil lamp lighting ceremony for events, supporting dual-screen tablet controls.">
    <link rel="stylesheet" href="style.css?v=24">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper display-wrapper">
        <div class="ritual-container" id="ritualContainer">
            <!-- Deep background revealed when doors open -->
            <div class="deep-background" id="deepBackground">
                <img src="gitgenius_logo.png" class="gitgenius-logo-img" alt="GitGenius Logo">
            </div>

            <!-- Ambient Background overlay -->
            <div class="ambient-vignette"></div>

            <!-- Stationary Background (blurs on finale) -->
            <div class="stationary-bg" id="stationaryBg">
                <div class="lit-overlay" id="stationaryLitOverlay"></div>
            </div>

            <!-- The Massive Circular Altar Gate -->
            <div class="altar-gate-wrapper" id="altarGate">
                <div class="altar-gate-circle">
                    <!-- Background tied to the moving gate -->
                    <div class="ritual-bg">
                        <div class="lit-overlay" id="litOverlay"></div>
                    </div>
                    
                    <!-- Altar System -->
                    <div class="altar-system">
                        <!-- Central Altar Disk with Exact Art -->
                        <div class="central-disk" id="altarDisk"></div>

                        <!-- The Oil Lamps container (Wicks will be injected here dynamically) -->
                        <div class="lamps-container" id="lampsContainer">
                            <!-- Loaded dynamically via script.js -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Guest Lighting Banner Overlay -->
            <div class="guest-banner" id="guestBanner">
                <div class="banner-border-line top"></div>
                <div class="banner-content">
                    <span class="banner-subtitle" id="bannerGuestTitle">CHIEF GUEST</span>
                    <h2 class="banner-title-name" id="bannerGuestName">Hon. Chief Guest</h2>
                    <span class="banner-badge">LIT THE OIL LAMP</span>
                </div>
                <div class="banner-border-line bottom"></div>
            </div>

            <!-- Floating Names Container (text floats up from wicks) -->
            <div class="floating-names-container" id="floatingNamesContainer"></div>

            <!-- Destruction/Celebration overlays -->
            <div class="destruction-overlay" id="destructionOverlay"></div>
            <div class="dust-container" id="dustContainer"></div>
        </div>

        <!-- The Reveal Container (Outside the ritual container to avoid filters) -->
        <div class="reveal-container" id="revealContainer">
            <div class="light-burst"></div>
            <img src="logo.png" alt="Genius Logo" class="reveal-logo">
        </div>


    </div>

    <!-- Configuration Script -->
    <script src="config.js?v=24"></script>
    <!-- Display Logic -->
    <script src="script.js?v=24"></script>
</body>
</html>
